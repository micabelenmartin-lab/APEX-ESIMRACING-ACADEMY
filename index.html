<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX — Sim Racing Profesional</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --black: #0A0A0A; --carbon: #141414; --surface: #1C1C1C;
            --border: #2A2A2A; --neon: #AAFF00; --yellow: #FFE500;
            --white: #E8E8E8; --muted: #888;
        }
        html { scroll-behavior: smooth; }
        body { background: var(--black); color: var(--white); font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* ── NAV ── */
        nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 48px; height: 64px;
            background: rgba(10,10,10,.88); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
        }
        .nav-logo { font-family: 'Barlow Condensed', sans-serif; font-size: 28px; font-weight: 900; letter-spacing: .08em; text-transform: uppercase; color: var(--neon); }
        .nav-links { display: flex; gap: 36px; list-style: none; }
        .nav-links a { font-size: 12px; font-weight: 500; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color .2s; }
        .nav-links a:hover { color: var(--neon); }
        .nav-cta { background: var(--neon); color: var(--black); font-size: 11px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; text-decoration: none; padding: 10px 22px; clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%); }

        /* ── HERO ── */
        .hero { position: relative; min-height: 100vh; display: flex; align-items: center; overflow: hidden; }
        .hero-diagonal { 
            position: absolute; right: -60px; top: 0; bottom: 0; width: 48%; 
            background: var(--carbon); clip-path: polygon(12% 0%, 100% 0%, 100% 100%, 0% 100%); 
            overflow: hidden; 
        }
        .hero-img-1, .hero-img-2 { 
            position: absolute; inset: 0; background-size: cover; background-position: center; 
            transition: opacity 0.5s ease; 
        }
        .hero-img-1 { background-image: url('image/HERO1.png'); z-index: 1; opacity: 1; }
        .hero-img-2 { background-image: url('image/HERO2.png'); z-index: 2; opacity: 0; }
        .hero:hover .hero-img-2 { opacity: 1; }

        .hero-content { position: relative; z-index: 2; padding: 0 48px; max-width: 700px; }
        .hero-title { font-family: 'Barlow Condensed', sans-serif; font-size: clamp(72px, 10vw, 128px); font-weight: 900; line-height: .92; text-transform: uppercase; }
        .hero-title .accent { color: var(--neon); font-style: italic; }

        @media (max-width: 900px) {
            .nav-links, .hero-diagonal { display: none; }
            .hero-content { padding: 80px 24px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-logo">APEX</div>
        <ul class="nav-links">
            <li><a href="#">Experiencias</a></li>
            <li><a href="#">Cursos</a></li>
        </ul>
        <a href="#" class="nav-cta">Inscribirme</a>
    </nav>

    <section class="hero">
        <div class="hero-diagonal">
            <div class="hero-img-1"></div>
            <div class="hero-img-2"></div>
        </div>
        <div class="hero-content">
            <h1 class="hero-title">DOMINA<br><span class="accent">EL LÍMITE</span></h1>
        </div>
    </section>

</body>
</html>
